<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Admin – Reservations</title>
    <link rel="stylesheet" href="Reservation.css">
</head>

<body>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
        <h2 class="admin-logo">☕ CoffeeAdmin</h2>
        <ul>
            <li><a href="Dashboard.html">Dashboard</a></li>
            <li class="active"><a href="Resrvation.html">Reservation</a></li>
            <li><a href="Profit.html">Profit</a></li>
            <li><a href="chat.html">Chat</a></li>
        </ul>
        <a class="logout-btn" href="login.html">Logout</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-content">
        <div class="container">

                <!-- Top Bar -->
                <header class="topbar">
                        <input id="searchInput" type="text" placeholder="Search reservation...">
                        <div class="topbar-right">
                            <button id="filterBtn" class="btn">Filter</button>
                            <button id="refreshBtn" class="btn">Refresh</button>
                            <button id="exportBtn" class="btn">Export CSV</button>
                        </div>
                </header>
                <div id="adminError" class="admin-error hidden" aria-live="assertive"></div>

        <!-- Filter popover: contains filter controls (search moved to topbar) -->
        <div id="filterPopover" class="filter-popover" aria-hidden="true">
            <div class="popover-inner">
                <select id="statusFilter">
                    <option value="all">All statuses</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Pending">Pending</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <select id="roomFilter">
                    <option value="all">All rooms</option>
                    <option value="function">Function</option>
                    <option value="study">Study</option>
                </select>
                <select id="dateRangeFilter">
                    <option value="all">All dates</option>
                    <option value="today">Today</option>
                    <option value="tomorrow">Tomorrow</option>
                    <option value="next7">Next 7 days</option>
                </select>
                <div class="popover-actions"><button id="resetFilters" class="btn">Reset Filters</button></div>
            </div>
        </div>

        <!-- CARDS -->
        <section class="cards">
            <div class="card">
                <h3>Total Reservations</h3>
                <p class="value" id="totalReservations">42</p>
            </div>
            <div class="card">
                <h3>Confirmed</h3>
                <p class="value" id="confirmedCount">31</p>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <p class="value" id="pendingCount">7</p>
            </div>
            <div class="card">
                <h3>Cancelled</h3>
                <p class="value" id="cancelledCount">4</p>
            </div>
        </section>

        <!-- TABLE + SUMMARY -->
        <section class="grid">

            <!-- Reservation Table -->
            <div class="table-box">
                <h3>Upcoming Reservations</h3>
                <table id="reservationTable">
                    <tr>
                        <th>Name</th>
                        <th data-sort="date" class="sortable">Date <span class="sort-indicator"></span></th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Room</th>
                        <th data-sort="guests" class="sortable">Guests <span class="sort-indicator"></span></th>
                        <th data-sort="status" class="sortable">Status <span class="sort-indicator"></span></th>
                        <th>Action</th>
                    </tr>

                    <!-- Rows will be generated by JS -->
                </table>
            </div>

            <!-- Reservation Summary removed per user request -->

        </section>

<!-- EDIT MODAL -->
<div id="editModal" class="modal hidden" aria-hidden="true">
  <div class="modal-inner">
    <div class="modal-header">
      <h2>Edit Reservation</h2>
      <button id="closeModalX" class="modal-close">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Reservation ID</label>
        <input type="text" id="editResId" disabled>
      </div>
      <div class="form-group">
      <!-- Name field removed from UI; keep hidden input for compatibility -->
      <input type="hidden" id="editName">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="editEmail">
      </div>
      <div class="form-group">
        <label>Room</label>
        <select id="editRoom">
          <option value="function">Function</option>
          <option value="study">Study</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="editStart">
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="editEnd">
      </div>
      <div class="form-group">
        <label>Pax</label>
        <input type="number" id="editPax" min="1">
      </div>
      <div class="form-group">
        <label>Equipment</label>
        <div id="editEquipment">
          <label class="checkbox">
            <input type="checkbox" value="Projector"> Projector
          </label>
          <label class="checkbox">
            <input type="checkbox" value="Speaker & Mic"> Speaker & Mic
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Total</label>
        <input type="number" id="editTotal" min="0">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="editStatus">
          <option value="Pending">Pending</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label class="checkbox">
          <input type="checkbox" id="forceOverride"> Force override operating hours
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button id="saveBtn" class="btn accent">Save</button>
      <button id="confirmBtn" class="btn primary">Confirm</button>
      <button id="rejectBtn" class="btn danger">Cancel</button>
      <button id="modalDeleteBtn" class="btn danger">Delete</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div id="deleteModal" class="modal hidden" aria-hidden="true">
  <div class="modal-inner modal-small">
    <div class="modal-header">
      <h2>Confirm Deletion</h2>
    </div>
    <div class="modal-body">
      <p id="deleteDetails"></p>
    </div>
    <div class="modal-footer">
      <button id="deleteConfirmBtn" class="btn danger">Delete</button>
      <button id="deleteCancelBtn" class="btn ghost">Cancel</button>
    </div>
  </div>
</div>


<script src="Reservation.js"></script>
        </div>
    </main>
</div>
</body>
</html>
