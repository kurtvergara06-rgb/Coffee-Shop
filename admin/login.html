<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Bat Cave Café</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h2 class="logo">Logo</h2>
  </header>

  <!-- LOGIN FORM -->
  <div class="wrapper">

    <!-- STEAM EFFECT (outside top via CSS top:-55px) -->
    <div class="steam" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- close icon -->
    <span class="icon-close">
      <ion-icon name="close"></ion-icon>
    </span>

    <div class="from-box login">
      <h2>Login</h2>

      <form action="#" method="post" novalidate>

        <!-- Email -->
        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" required placeholder=" ">
          <label>Email</label>
        </div>

        <!-- Password -->
        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" required placeholder=" ">
          <label>Password</label>
        </div>

        <!-- Remember / Forgot -->
        <div class="remember-forgot">
          <label>
            <input type="checkbox">
            Remember me
          </label>

          <a href="#">Forgot Password?</a>
        </div>

        <!-- Button -->
        <button type="submit" class="btn">Login</button>

      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    // Simple client-side login handler: validate fields then navigate to dashboard.
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.querySelector('.from-box.login form') || document.querySelector('form');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const emailEl = form.querySelector('input[type="email"]');
        const passEl = form.querySelector('input[type="password"]');
        const email = emailEl ? emailEl.value.trim() : '';
        const pass = passEl ? passEl.value.trim() : '';
        if (!email || !pass) {
          // minimal feedback; keep it simple for now
          alert('Please enter email and password');
          return;
        }
        // If you have a server-side login endpoint, replace this with a fetch() call
        // and only redirect on successful authentication. For now, navigate to dashboard.
        window.location.href = 'Dashboard.html';
      });
    });
  </script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
